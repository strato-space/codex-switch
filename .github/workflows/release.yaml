name: Build and Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ($TAG) does not match package.json version ($VERSION)"
            exit 1
          fi

      - name: Build VSIX package
        run: npm run vscode:package -- --out codex-switch.vsix

      - name: Generate release notes
        run: |
          awk -f release-notes.awk CHANGELOG.md > release.md

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm run vscode:publish -- --packagePath codex-switch.vsix

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: release.md
          artifacts: codex-switch.vsix
